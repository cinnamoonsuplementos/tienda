<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CINNAMOON — Tienda Online</title>
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600;700&family=DM+Sans:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@1,400;1,600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F2EAFA; --dark: #38103F; --gold: #B87228; --gold2: #E09850;
  --purple: #7C3CA0; --laven: #9C70B4; --cream: #F0E0C0; --hdr: #2C0C38;
  --card: #fff; --radius: 14px; --shadow: 0 4px 22px rgba(56,16,63,.12);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--dark); }
img { display: block; }
button { cursor: pointer; border: none; background: none; font-family: inherit; }

/* ── LANDING ── */
#landing {
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: var(--hdr); position: relative; overflow: hidden; padding: 40px 20px;
}
#landing::before {
  content: ''; position: absolute; top: -120px; right: -120px;
  width: 420px; height: 420px; border-radius: 50%;
  background: radial-gradient(circle, rgba(220,195,245,.18) 0%, transparent 68%);
  pointer-events: none;
}
#landing::after {
  content: ''; position: absolute; bottom: -100px; left: -100px;
  width: 360px; height: 360px; border-radius: 50%;
  background: radial-gradient(circle, rgba(220,195,245,.12) 0%, transparent 68%);
  pointer-events: none;
}
.landing-logo {
  width: 90px; height: 90px; border-radius: 50%; object-fit: cover;
  box-shadow: 0 6px 32px rgba(56,16,63,.4), 0 0 0 2px rgba(224,152,80,.5);
  margin-bottom: 20px; position: relative; z-index: 1;
}
.landing-brand {
  font-family: 'Josefin Sans', sans-serif; font-size: 2.4rem; font-weight: 700;
  letter-spacing: 8px; text-transform: uppercase; color: #fff;
  margin-bottom: 6px; position: relative; z-index: 1;
}
.landing-rule {
  width: 80px; height: 1.5px; margin: 0 auto 14px;
  background: linear-gradient(90deg, transparent, var(--gold2) 30%, var(--gold2) 70%, transparent);
}
.landing-slogan {
  font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.25rem;
  color: var(--gold2); margin-bottom: 10px; position: relative; z-index: 1;
}
.landing-sub {
  font-size: .75rem; letter-spacing: 3px; text-transform: uppercase;
  color: rgba(240,224,192,.5); margin-bottom: 48px; position: relative; z-index: 1;
}
.landing-prompt {
  font-family: 'Josefin Sans', sans-serif; font-size: .8rem; letter-spacing: 3px;
  text-transform: uppercase; color: rgba(240,224,192,.45); margin-bottom: 24px; z-index: 1;
}
.city-selector { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; z-index: 1; }
.city-card {
  background: rgba(255,255,255,.06); border: 1px solid rgba(224,152,80,.3);
  border-radius: 18px; padding: 32px 40px; min-width: 200px; text-align: center;
  transition: transform .2s, background .2s, border-color .2s;
  cursor: pointer;
}
.city-card:hover {
  transform: translateY(-4px); background: rgba(255,255,255,.12);
  border-color: var(--gold2);
}
.city-card .city-icon { font-size: 2.4rem; margin-bottom: 12px; }
.city-card .city-name {
  font-family: 'Josefin Sans', sans-serif; font-size: 1.15rem; font-weight: 700;
  letter-spacing: 3px; text-transform: uppercase; color: #fff; margin-bottom: 6px;
}
.city-card .city-count {
  font-size: .72rem; letter-spacing: 2px; text-transform: uppercase; color: var(--gold2);
}

/* ── STORE ── */
#store { display: none; flex-direction: column; min-height: 100vh; }
#store.active { display: flex; }

.store-header {
  background: var(--hdr); padding: 12px 20px;
  display: flex; align-items: center; gap: 12px;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 16px rgba(0,0,0,.3);
}
.store-header::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1.5px;
  background: linear-gradient(90deg, transparent, var(--gold2) 40%, var(--gold2) 60%, transparent);
}
.back-btn {
  color: rgba(240,224,192,.6); font-size: 1.2rem; padding: 4px 8px;
  border-radius: 8px; transition: color .2s, background .2s;
  flex-shrink: 0;
}
.back-btn:hover { color: var(--gold2); background: rgba(255,255,255,.06); }
.header-logo {
  width: 38px; height: 38px; border-radius: 50%; object-fit: cover;
  border: 1.5px solid rgba(224,152,80,.4); flex-shrink: 0;
}
.header-info { flex: 1; min-width: 0; }
.header-brand {
  font-family: 'Josefin Sans', sans-serif; font-size: .95rem; font-weight: 700;
  letter-spacing: 3px; text-transform: uppercase; color: #fff; line-height: 1;
}
.header-city {
  font-size: .68rem; letter-spacing: 2px; text-transform: uppercase; color: var(--gold2);
  margin-top: 2px;
}
.cart-btn {
  position: relative; padding: 8px 14px;
  background: rgba(255,255,255,.08); border-radius: 10px;
  color: #fff; font-family: 'Josefin Sans', sans-serif; font-size: .85rem;
  font-weight: 600; letter-spacing: 1px; display: flex; align-items: center; gap: 6px;
  border: 1px solid rgba(224,152,80,.25); transition: background .2s, border-color .2s;
  flex-shrink: 0;
}
.cart-btn:hover { background: rgba(255,255,255,.14); border-color: var(--gold2); }
.cart-badge {
  background: var(--gold2); color: var(--dark); font-size: .65rem; font-weight: 700;
  border-radius: 20px; padding: 1px 6px; min-width: 18px; text-align: center;
}

/* ── CATEGORY NAV ── */
.cat-nav {
  background: var(--hdr); padding: 0 16px 12px;
  display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none;
  position: sticky; top: 63px; z-index: 99;
}
.cat-nav::-webkit-scrollbar { display: none; }
.cat-pill {
  flex-shrink: 0; padding: 6px 16px;
  background: rgba(255,255,255,.06); border: 1px solid rgba(224,152,80,.2);
  border-radius: 20px; color: rgba(240,224,192,.6);
  font-family: 'Josefin Sans', sans-serif; font-size: .72rem; font-weight: 600;
  letter-spacing: 1.5px; text-transform: uppercase; transition: all .2s;
}
.cat-pill:hover { background: rgba(255,255,255,.1); color: #fff; }
.cat-pill.active { background: var(--gold2); border-color: var(--gold2); color: var(--dark); }

/* ── PRODUCT GRID ── */
.store-body { flex: 1; padding: 20px 16px 100px; }
.section-title {
  font-family: 'Josefin Sans', sans-serif; font-size: .7rem; font-weight: 700;
  letter-spacing: 3px; text-transform: uppercase; color: var(--laven);
  padding: 16px 0 10px; border-bottom: 1px solid rgba(156,112,180,.2);
  margin-bottom: 14px;
}
.section-title span { color: var(--gold2); }
#product-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 14px;
}
.prod-card {
  background: var(--card); border-radius: var(--radius);
  box-shadow: var(--shadow); overflow: hidden;
  display: flex; flex-direction: column;
  border: 1px solid rgba(156,112,180,.12);
  transition: transform .2s, box-shadow .2s;
}
.prod-card:hover { transform: translateY(-3px); box-shadow: 0 8px 32px rgba(56,16,63,.18); }
.prod-img-wrap {
  background: var(--bg); padding: 14px 14px 8px;
  display: flex; align-items: center; justify-content: center;
  height: 150px;
}
.prod-img-wrap img {
  max-width: 100%; max-height: 128px; object-fit: contain;
  filter: drop-shadow(0 3px 8px rgba(56,16,63,.14));
}
.prod-info { padding: 10px 12px 12px; flex: 1; display: flex; flex-direction: column; }
.prod-cat-tag {
  font-size: .6rem; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--laven); margin-bottom: 4px;
}
.prod-brand {
  font-family: 'Josefin Sans', sans-serif; font-size: .72rem; font-weight: 600;
  letter-spacing: 1px; text-transform: uppercase; color: var(--gold);
  margin-bottom: 3px;
}
.prod-name {
  font-family: 'Josefin Sans', sans-serif; font-size: .88rem; font-weight: 700;
  color: var(--dark); line-height: 1.25; margin-bottom: 4px;
}
.prod-det { font-size: .72rem; color: var(--laven); line-height: 1.4; margin-bottom: 8px; flex: 1; }
.prod-price {
  font-family: 'Josefin Sans', sans-serif; font-size: 1.05rem; font-weight: 700;
  color: var(--gold); margin-bottom: 10px;
}
.prod-actions { display: flex; align-items: center; gap: 6px; }
.btn-add {
  flex: 1; background: var(--dark); color: var(--cream);
  font-family: 'Josefin Sans', sans-serif; font-size: .72rem; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase; padding: 8px 10px;
  border-radius: 8px; transition: background .2s;
}
.btn-add:hover { background: var(--purple); }
.qty-ctrl { display: flex; align-items: center; gap: 6px; flex: 1; justify-content: center; }
.qty-btn {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--bg); border: 1.5px solid rgba(156,112,180,.3);
  color: var(--dark); font-size: 1rem; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  transition: background .2s, border-color .2s;
}
.qty-btn:hover { background: var(--laven); color: #fff; border-color: var(--laven); }
.qty-num {
  font-family: 'Josefin Sans', sans-serif; font-size: .9rem; font-weight: 700;
  color: var(--dark); min-width: 20px; text-align: center;
}

/* ── CART DRAWER ── */
#cart-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.45); z-index: 200; backdrop-filter: blur(2px);
}
#cart-overlay.open { display: block; }
#cart-drawer {
  position: fixed; top: 0; right: 0; bottom: 0; width: min(400px, 100vw);
  background: #fff; z-index: 201; transform: translateX(100%);
  transition: transform .3s cubic-bezier(.4,0,.2,1);
  display: flex; flex-direction: column;
  box-shadow: -8px 0 40px rgba(56,16,63,.18);
}
#cart-drawer.open { transform: translateX(0); }
.cart-head {
  background: var(--hdr); padding: 18px 20px;
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
.cart-head::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1.5px;
  background: linear-gradient(90deg, transparent, var(--gold2), transparent);
}
.cart-title {
  font-family: 'Josefin Sans', sans-serif; font-size: 1rem; font-weight: 700;
  letter-spacing: 3px; text-transform: uppercase; color: #fff;
}
.cart-close {
  color: rgba(240,224,192,.6); font-size: 1.4rem; padding: 4px;
  transition: color .2s;
}
.cart-close:hover { color: var(--gold2); }
#cart-items { flex: 1; overflow-y: auto; padding: 16px; }
.cart-empty {
  text-align: center; padding: 60px 20px;
  color: var(--laven); font-size: .9rem;
}
.cart-empty-icon { font-size: 3rem; margin-bottom: 12px; opacity: .4; }
.cart-item {
  display: flex; gap: 12px; padding: 12px 0;
  border-bottom: 1px solid rgba(156,112,180,.15);
}
.cart-item-img {
  width: 56px; height: 56px; flex-shrink: 0;
  background: var(--bg); border-radius: 10px;
  display: flex; align-items: center; justify-content: center; overflow: hidden;
}
.cart-item-img img { width: 100%; height: 100%; object-fit: contain; }
.cart-item-info { flex: 1; min-width: 0; }
.cart-item-brand { font-size: .65rem; letter-spacing: 1px; text-transform: uppercase; color: var(--gold); }
.cart-item-name { font-family: 'Josefin Sans', sans-serif; font-size: .85rem; font-weight: 700; color: var(--dark); line-height: 1.2; margin-bottom: 4px; }
.cart-item-det { font-size: .68rem; color: var(--laven); }
.cart-item-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; flex-shrink: 0; }
.cart-item-price { font-family: 'Josefin Sans', sans-serif; font-size: .88rem; font-weight: 700; color: var(--gold); }
.cart-item-ctrl { display: flex; align-items: center; gap: 6px; }
.ci-btn {
  width: 24px; height: 24px; border-radius: 50%;
  background: var(--bg); border: 1.5px solid rgba(156,112,180,.3);
  color: var(--dark); font-size: .9rem; display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
.ci-btn:hover { background: var(--laven); color: #fff; }
.ci-num { font-size: .8rem; font-weight: 700; min-width: 16px; text-align: center; color: var(--dark); }
.cart-foot { padding: 16px 20px; border-top: 1px solid rgba(156,112,180,.2); flex-shrink: 0; }
.cart-total-row {
  display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px;
}
.cart-total-label {
  font-family: 'Josefin Sans', sans-serif; font-size: .8rem; letter-spacing: 2px;
  text-transform: uppercase; color: var(--laven);
}
.cart-total-val {
  font-family: 'Josefin Sans', sans-serif; font-size: 1.4rem; font-weight: 700; color: var(--dark);
}
.btn-whatsapp {
  width: 100%; padding: 14px; border-radius: 12px;
  background: #25D366; color: #fff;
  font-family: 'Josefin Sans', sans-serif; font-size: .85rem; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: background .2s, transform .15s;
}
.btn-whatsapp:hover { background: #1ebe59; transform: translateY(-1px); }
.btn-whatsapp:disabled { background: #ccc; transform: none; cursor: not-allowed; }

/* ── EMPTY STATE ── */
#no-results {
  grid-column: 1/-1; text-align: center; padding: 60px 20px;
  color: var(--laven); display: none;
}

/* ── RESPONSIVE ── */
@media (max-width: 480px) {
  .landing-brand { font-size: 1.8rem; letter-spacing: 5px; }
  .city-card { padding: 24px 28px; min-width: 150px; }
  #product-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .prod-img-wrap { height: 120px; }
  .prod-img-wrap img { max-height: 100px; }
}
</style>
</head>

<section id="store">

</div>

// ── STATE ─────────────────────────────────────────────────────────────────────
let currentStore = null;
let activeCategory = 'ALL';
let cart = {}; // key: product.n → { product, qty }

// ── HELPERS ───────────────────────────────────────────────────────────────────
function fmtPrice(n) {
  return '$' + n.toLocaleString('es-AR');
}

function imgSrc(store, n) {
  return store.imgBase + n + '.png';
}

function productKey(n) { return String(n); }

function getCategories(store) {
  const cats = new Set(store.products.map(p => p.cat));
  return CAT_ORDER.filter(c => cats.has(c));
}

function getDetails(p) {
  const parts = [];
  if (p.qty  && p.qty  !== '-') parts.push(p.qty);
  if (p.svc  && p.svc  !== '-') parts.push(p.svc + ' serv.');
  if (p.flavor && p.flavor !== '-') parts.push(p.flavor);
  return parts.join(' · ');
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
function openStore(key) {
  currentStore = STORES[key];
  cart = {};
  activeCategory = 'ALL';
  document.getElementById('header-city').textContent = currentStore.name;
  document.getElementById('landing').style.display = 'none';
  document.getElementById('store').classList.add('active');
  buildCatNav();
  renderProducts();
  updateCartUI();
}

function goBack() {
  document.getElementById('store').classList.remove('active');
  document.getElementById('landing').style.display = '';
  closeCart();
  currentStore = null;
  cart = {};
}

// ── CATEGORY NAV ──────────────────────────────────────────────────────────────
function buildCatNav() {
  const nav = document.getElementById('cat-nav');
  nav.innerHTML = '';
  const cats = ['ALL', ...getCategories(currentStore)];
  cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-pill' + (cat === 'ALL' ? ' active' : '');
    btn.textContent = cat === 'ALL' ? 'Todos' : (CAT_LABELS[cat] || cat);
    btn.onclick = () => filterCategory(cat, btn);
    nav.appendChild(btn);
  });
}

function filterCategory(cat, btn) {
  activeCategory = cat;
  document.querySelectorAll('.cat-pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderProducts();
}

// ── PRODUCT GRID ──────────────────────────────────────────────────────────────
function renderProducts() {
  const grid = document.getElementById('product-grid');
  grid.innerHTML = '';
  const noResults = document.getElementById('no-results');

  const products = activeCategory === 'ALL'
    ? currentStore.products
    : currentStore.products.filter(p => p.cat === activeCategory);

  if (products.length === 0) {
    noResults.style.display = 'block';
    return;
  }
  noResults.style.display = 'none';

  // Group by category if showing all
  if (activeCategory === 'ALL') {
    const groups = {};
    CAT_ORDER.forEach(c => { groups[c] = []; });
    products.forEach(p => { if (groups[p.cat]) groups[p.cat].push(p); });
    CAT_ORDER.forEach(cat => {
      if (!groups[cat].length) return;
      const title = document.createElement('div');
      title.className = 'section-title';
      title.innerHTML = CAT_LABELS[cat] || cat;
      title.style.gridColumn = '1 / -1';
      grid.appendChild(title);
      groups[cat].forEach(p => grid.appendChild(buildProductCard(p)));
    });
  } else {
    products.forEach(p => grid.appendChild(buildProductCard(p)));
  }
}

function buildProductCard(p) {
  const key = productKey(p.n);
  const inCart = cart[key];
  const qty = inCart ? inCart.qty : 0;
  const det = getDetails(p);

  const card = document.createElement('div');
  card.className = 'prod-card';
  card.id = 'card-' + key;
  card.innerHTML = `
    <div class="prod-img-wrap">
      <img src="${imgSrc(currentStore, p.n)}" alt="${p.desc}" loading="lazy"
           onerror="this.src=''; this.parentNode.innerHTML='<span style=\'font-size:2rem;opacity:.3\'>📦</span>'">
    </div>
    <div class="prod-info">
      ${p.brand ? `<div class="prod-brand">${p.brand}</div>` : ''}
      <div class="prod-name">${p.desc}</div>
      ${det ? `<div class="prod-det">${det}</div>` : '<div class="prod-det"></div>'}
      <div class="prod-price">${fmtPrice(p.price)}</div>
      <div class="prod-actions" id="actions-${key}">
        ${qty === 0
          ? `<button class="btn-add" onclick="addToCart(${p.n})">+ Agregar</button>`
          : `<div class="qty-ctrl">
               <button class="qty-btn" onclick="changeQty(${p.n}, -1)">−</button>
               <span class="qty-num">${qty}</span>
               <button class="qty-btn" onclick="changeQty(${p.n}, 1)">+</button>
             </div>`
        }
      </div>
    </div>`;
  return card;
}

function refreshCardActions(p) {
  const key = productKey(p.n);
  const el = document.getElementById('actions-' + key);
  if (!el) return;
  const qty = cart[key] ? cart[key].qty : 0;
  el.innerHTML = qty === 0
    ? `<button class="btn-add" onclick="addToCart(${p.n})">+ Agregar</button>`
    : `<div class="qty-ctrl">
         <button class="qty-btn" onclick="changeQty(${p.n}, -1)">−</button>
         <span class="qty-num">${qty}</span>
         <button class="qty-btn" onclick="changeQty(${p.n}, 1)">+</button>
       </div>`;
}

// ── CART LOGIC ────────────────────────────────────────────────────────────────
function addToCart(n) {
  const key = productKey(n);
  const p = currentStore.products.find(x => x.n === n);
  if (!p) return;
  cart[key] = cart[key] ? { product: p, qty: cart[key].qty + 1 } : { product: p, qty: 1 };
  refreshCardActions(p);
  updateCartUI();
}

function changeQty(n, delta) {
  const key = productKey(n);
  if (!cart[key]) return;
  const newQty = cart[key].qty + delta;
  if (newQty <= 0) {
    delete cart[key];
  } else {
    cart[key].qty = newQty;
  }
  const p = currentStore.products.find(x => x.n === n);
  refreshCardActions(p);
  updateCartUI();
}

function removeFromCart(n) {
  delete cart[productKey(n)];
  const p = currentStore.products.find(x => x.n === n);
  refreshCardActions(p);
  updateCartUI();
}

function getCartItems() {
  return Object.values(cart);
}

function getCartTotal() {
  return getCartItems().reduce((sum, {product, qty}) => sum + product.price * qty, 0);
}

function getCartCount() {
  return getCartItems().reduce((sum, {qty}) => sum + qty, 0);
}

function updateCartUI() {
  const count = getCartCount();
  document.getElementById('cart-count').textContent = count;

  const total = getCartTotal();
  document.getElementById('cart-total').textContent = fmtPrice(total);

  const itemsEl = document.getElementById('cart-items');
  const items = getCartItems();

  if (items.length === 0) {
    itemsEl.innerHTML = `<div class="cart-empty">
      <div class="cart-empty-icon">🛒</div>
      <p>Tu carrito está vacío</p>
    </div>`;
    document.getElementById('btn-whatsapp').disabled = true;
    return;
  }

  document.getElementById('btn-whatsapp').disabled = false;
  itemsEl.innerHTML = items.map(({product: p, qty}) => `
    <div class="cart-item">
      <div class="cart-item-img">
        <img src="${imgSrc(currentStore, p.n)}" alt="${p.desc}"
             onerror="this.src=''; this.parentNode.innerHTML='📦'">
      </div>
      <div class="cart-item-info">
        ${p.brand ? `<div class="cart-item-brand">${p.brand}</div>` : ''}
        <div class="cart-item-name">${p.desc}</div>
        ${p.qty || p.svc ? `<div class="cart-item-det">${getDetails(p)}</div>` : ''}
      </div>
      <div class="cart-item-right">
        <div class="cart-item-price">${fmtPrice(p.price * qty)}</div>
        <div class="cart-item-ctrl">
          <button class="ci-btn" onclick="changeQty(${p.n}, -1)">−</button>
          <span class="ci-num">${qty}</span>
          <button class="ci-btn" onclick="changeQty(${p.n}, 1)">+</button>
        </div>
      </div>
    </div>`).join('');
}

// ── CART DRAWER ───────────────────────────────────────────────────────────────
function toggleCart() {
  const drawer = document.getElementById('cart-drawer');
  const overlay = document.getElementById('cart-overlay');
  const open = drawer.classList.toggle('open');
  overlay.classList.toggle('open', open);
  document.body.style.overflow = open ? 'hidden' : '';
}

function closeCart() {
  document.getElementById('cart-drawer').classList.remove('open');
  document.getElementById('cart-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

// ── WHATSAPP ──────────────────────────────────────────────────────────────────
function sendWhatsApp() {
  const items = getCartItems();
  if (!items.length) return;

  const lines = items.map(({product: p, qty}) => {
    const name = p.brand ? `${p.brand} — ${p.desc}` : p.desc;
    const det = getDetails(p);
    const sub = fmtPrice(p.price * qty);
    return `• ${name}${det ? ' (' + det + ')' : ''} x${qty}  →  ${sub}`;
  });

  const total = fmtPrice(getCartTotal());
  const msg = [
    `🛒 *Pedido CINNAMOON — ${currentStore.name}*`,
    '',
    ...lines,
    '',
    `*Total: ${total}*`,
    '',
    '¡Quiero hacer este pedido! 💪'
  ].join('\n');

  const url = `https://wa.me/${currentStore.wa}?text=${encodeURIComponent(msg)}`;
  window.open(url, '_blank');
}
</script>
